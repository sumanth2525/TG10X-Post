# Online schedule: GitHub runs this on a cron (UTC). No Task Scheduler needed.
# Setup: push this repo to GitHub → Settings → Secrets → add TG10X_EMAIL + TG10X_PASSWORD.
# Manual run: Actions → "TG10X daily post" → Run workflow.

name: TG10X daily post

on:
  schedule:
    # 04:30 UTC daily (~10:00 IST). Edit as needed (GitHub uses UTC only).
    - cron: "30 4 * * *"
  workflow_dispatch:

concurrency:
  group: tg10x-daily
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run daily post
        env:
          TG10X_EMAIL: ${{ secrets.TG10X_EMAIL }}
          TG10X_PASSWORD: ${{ secrets.TG10X_PASSWORD }}
          TG10X_POST_TEXT: ${{ secrets.TG10X_POST_TEXT }}
          TG10X_BASE_URL: ${{ secrets.TG10X_BASE_URL }}
          HEADLESS: "1"
          POST_ONLY: "1"
        run: npm run tg10x:daily

      - name: Upload error screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tg10x-error
          path: tg10x-error.png
          if-no-files-found: ignore

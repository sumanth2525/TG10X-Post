# Online schedule: GitHub runs this on a cron (UTC). No Task Scheduler needed.
# Setup: push this repo to GitHub → Settings → Secrets → add TG10X_EMAIL + TG10X_PASSWORD.
# Manual run: Actions → "TG10X daily post" → Run workflow.

name: TG10X daily post

on:
  schedule:
    # 7:30 AM Eastern Standard Time (EST) = 12:30 UTC. GitHub cron is UTC only.
    # During EDT (daylight saving), 7:30 AM Eastern = 11:30 UTC → use "30 11 * * *" instead.
    - cron: "30 12 * * *"
    # 7:33 PM EST = 00:33 UTC (same local evening each EST day).
    # During EDT: 7:33 PM Eastern = 23:33 UTC → use "33 23 * * *" instead.
    - cron: "33 0 * * *"
    # 7:35 PM EST = 00:35 UTC. During EDT: 7:35 PM Eastern = 23:35 UTC → "35 23 * * *"
    - cron: "35 0 * * *"
    # 8:00 PM EST = 01:00 UTC. During EDT: 8:00 PM Eastern = 00:00 UTC → "0 0 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: tg10x-daily
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run daily post
        env:
          TG10X_EMAIL: ${{ secrets.TG10X_EMAIL }}
          TG10X_PASSWORD: ${{ secrets.TG10X_PASSWORD }}
          TG10X_POST_TEXT: ${{ secrets.TG10X_POST_TEXT }}
          TG10X_BASE_URL: ${{ secrets.TG10X_BASE_URL }}
          HEADLESS: "1"
          POST_ONLY: "1"
        run: npm run tg10x:daily

      - name: Upload error screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tg10x-error
          path: tg10x-error.png
          if-no-files-found: ignore
